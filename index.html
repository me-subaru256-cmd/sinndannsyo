<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたにぴったりの勉強法診断</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #E3F2FD;
            --text-color: #333;
        }
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: var(--primary-color); font-size: 1.5rem; }
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: 0.3s;
        }
        .question { font-size: 1.2rem; margin-bottom: 20px; display: none; }
        .active { display: block; }
        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .result-card { display: none; text-align: left; }
        .icon { font-size: 3rem; display: block; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="quiz-part">
        <h1>あなたにぴったりの勉強法診断</h1>
        <p id="desc">あなたの性格から最適な学習スタイルを見つけます</p>
        <div class="progress-bar"><div id="progress"></div></div>
        
        <div id="q-container">
            </div>
    </div>

    <div id="result-part" class="result-card">
        <span class="icon" id="res-icon"></span>
        <h2 id="res-title" style="text-align:center;"></h2>
        <p id="res-desc"></p>
        <div style="background: #f0f7ff; padding: 15px; border-radius: 10px;">
            <strong>💡 おすすめ勉強法:</strong>
            <ul id="res-tips"></ul>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; background:#aaa;">もう一度診断する</button>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxiSgYtB-Dp9s8n2D7X-DFWAWSYrJlNAOAgpIc49OEZOxxHMSXXaAW0NmS'; // ★後で書き換える

    const questions = [
        { q: "教科書の図やイラストに目が止まることが多い", type: "視覚型" },
        { q: "音読すると内容を覚えやすいと感じる", type: "聴覚型" },
        { q: "実際に手を動かしてやってみることで理解できる", type: "体験型" },
        { q: "文章を箇条書きやリストに整理するのが得意", type: "読み書き型" },
        { q: "「なぜそうなるのか」理由がわかると納得できる", type: "論理型" }
    ];

    const types = {
        "視覚型": {
            title: "視覚型学習者 👁️",
            desc: "図やグラフで理解するのが得意。カラフルなノートを作るのがおすすめ！",
            tips: ["マインドマップを使って整理しよう", "カラーペンで重要箇所を色分け", "YouTube動画や図解を活用"]
        },
        "聴覚型": {
            title: "聴覚型学習者 🎧",
            desc: "聞いて理解するのが得意。音読や講義形式がおすすめ！",
            tips: ["「音読勉強法」が効果的", "友達に説明して理解を深める", "軽いBGMで集中力UP"]
        },
        "体験型": {
            title: "体験型学習者 ✍️",
            desc: "実際に書いたり体を動かしたりすることで理解が深まるタイプ。",
            tips: ["「反復書き取り」が効果的", "実験や体験学習に参加しよう", "ポモドーロ法で集中力UP"]
        },
        "読み書き型": {
            title: "読み書き型学習者 📖",
            desc: "文章を読んで整理することが得意。ノートにまとめるタイプです。",
            tips: ["自分の言葉でまとめ直そう", "箇条書きで情報を整理", "「自作問題法」がおすすめ"]
        },
        "論理型": {
            title: "論理型学習者 🧩",
            desc: "理由や仕組みから理解するのが得意。「なぜ？」を追求するタイプ。",
            tips: ["「なぜそうなるのか」を徹底調査", "原理・原則から応用力をつける", "「解法の流れ」を考える習慣を"]
        }
    };

    let currentIdx = 0;
    let scores = { "視覚型": 0, "聴覚型": 0, "体験型": 0, "読み書き型": 0, "論理型": 0 };

    function init() {
        const container = document.getElementById('q-container');
        questions.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `question ${i === 0 ? 'active' : ''}`;
            div.id = `q-${i}`;
            div.innerHTML = `
                <p>${item.q}</p>
                <button onclick="answer('${item.type}', 1)">あてはまる</button>
                <button onclick="answer('${item.type}', 0)" style="background:#b0bec5;">あまりあてはまらない</button>
            `;
            container.appendChild(div);
        });
    }

    async function answer(type, score) {
        scores[type] += score;
        document.getElementById(`q-${currentIdx}`).classList.remove('active');
        currentIdx++;
        
        document.getElementById('progress').style.width = `${(currentIdx / questions.length) * 100}%`;

        if (currentIdx < questions.length) {
            document.getElementById(`q-${currentIdx}`).classList.add('active');
        } else {
            showResult();
        }
    }

    async function showResult() {
        document.getElementById('quiz-part').style.display = 'none';
        
        // 最大スコアのタイプを判定
        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const result = types[winner];

        document.getElementById('res-title').innerText = result.title;
        document.getElementById('res-desc').innerText = result.desc;
        const tipsList = document.getElementById('res-tips');
        result.tips.forEach(t => {
            const li = document.createElement('li');
            li.innerText = t;
            tipsList.appendChild(li);
        });
        document.getElementById('result-part').style.display = 'block';

        // データの送信
        sendData(winner);
    }

    async function sendData(winnerType) {
        // 地域情報の取得（簡易版）
        let location = "不明";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const json = await res.json();
            location = `${json.region} ${json.city}`;
        } catch (e) { console.log("Location error"); }

        const payload = {
            timestamp: new Date().toLocaleString('ja-JP'),
            result: winnerType,
            scores: scores,
            location: location,
            device: navigator.userAgent
        };

        // CORS対策済みの送信方式
        const formData = new URLSearchParams();
        formData.append('data', JSON.stringify(payload));

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
        } catch (e) { console.error("Send error", e); }
    }

    init();
</script>
</body>
</html>
